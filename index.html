<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Ta lettre à ton employeur — Momenta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--vert:#01282b;--corail:#ff706b;--gris:#ded9d4;--creme:#f2f0eb;--pale:#fcfcfa}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--vert);color:var(--pale);line-height:1.55;font-size:17px;
  -webkit-font-smoothing:antialiased;
}
.app{min-height:100%;display:flex;flex-direction:column}

.bar{padding:20px 24px 0;flex-shrink:0}
.bar-inner{max-width:620px;margin:0 auto 14px;display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:800;font-size:19px;letter-spacing:-.02em}
.logo span{color:var(--corail)}
.compte{font-size:13px;font-weight:600;opacity:.55;letter-spacing:.04em}
.piste{max-width:620px;margin:0 auto;height:3px;background:rgba(252,252,250,.16);border-radius:2px;overflow:hidden}
.jauge{height:100%;width:0;background:var(--corail);transition:width .32s cubic-bezier(.4,0,.2,1)}

.scene{flex:1;display:flex;align-items:center;padding:32px 24px 48px}
.etape{max-width:620px;margin:0 auto;width:100%;animation:entre .34s cubic-bezier(.16,1,.3,1)}
@keyframes entre{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.q{font-size:clamp(25px,4.6vw,34px);font-weight:800;letter-spacing:-.025em;line-height:1.18;margin-bottom:8px}
.aide{font-size:15.5px;opacity:.62;margin-bottom:26px}

.choix{display:flex;flex-direction:column;gap:9px}
.opt{
  width:100%;text-align:left;font-family:inherit;font-size:17px;font-weight:500;
  background:rgba(252,252,250,.06);color:var(--pale);
  border:1.5px solid rgba(252,252,250,.16);border-radius:3px;
  padding:16px 20px;cursor:pointer;transition:all .13s;position:relative;
}
.opt:hover,.opt:focus-visible{background:rgba(255,112,107,.14);border-color:var(--corail);outline:none;transform:translateX(3px)}
.opt .sous{display:block;font-size:14px;font-weight:400;opacity:.55;margin-top:3px}
.opt.coche{background:rgba(255,112,107,.18);border-color:var(--corail)}
.opt.coche::after{
  content:"";position:absolute;right:20px;top:50%;margin-top:-6px;
  width:7px;height:12px;border:solid var(--corail);border-width:0 2.5px 2.5px 0;
  transform:rotate(43deg);
}

/* champ « Autre » qui s'écrit sur place */
.autre-boite{
  display:flex;gap:9px;align-items:stretch;
  border:1.5px solid var(--corail);border-radius:3px;
  background:rgba(255,112,107,.1);padding:4px 4px 4px 16px;
}
.autre-boite input{
  flex:1;background:none;border:none;color:var(--pale);
  font-family:inherit;font-size:17px;padding:12px 0;
}
.autre-boite input::placeholder{color:rgba(252,252,250,.4)}
.autre-boite input:focus{outline:none}
.fleche{
  flex-shrink:0;background:var(--corail);color:var(--vert);border:none;
  font-family:inherit;font-size:19px;font-weight:700;width:48px;border-radius:2px;cursor:pointer;
}
.fleche:disabled{opacity:.3;cursor:not-allowed}

.suite{margin-top:22px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.retour{
  margin-top:22px;background:none;border:none;color:var(--pale);opacity:.45;
  font-family:inherit;font-size:14.5px;cursor:pointer;padding:6px 0;display:block;
}
.retour:hover{opacity:.8}

.btn{
  font-family:inherit;font-size:15.5px;font-weight:700;letter-spacing:.02em;
  background:var(--corail);color:var(--vert);border:none;
  padding:15px 30px;border-radius:3px;cursor:pointer;transition:opacity .13s;
}
.btn:hover{opacity:.86}
.btn.ghost{background:none;border:1.5px solid rgba(252,252,250,.3);color:var(--pale)}
.btn.ghost:hover{border-color:var(--pale);opacity:1}
.btn.sm{font-size:14px;padding:11px 20px}
.btn:disabled{opacity:.32;cursor:not-allowed}
.btn:disabled:hover{opacity:.32}

/* formulaire final — calqué sur momentareseau.com */
.bloc-titre{
  font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  opacity:.5;margin:26px 0 12px;
}
.bloc-titre:first-of-type{margin-top:0}
.pile{display:flex;flex-direction:column;gap:11px}
.pile input{
  width:100%;font-family:inherit;font-size:16.5px;padding:14px 16px;
  background:rgba(252,252,250,.07);color:var(--pale);
  border:1.5px solid rgba(252,252,250,.18);border-radius:3px;
}
.pile input::placeholder{color:rgba(252,252,250,.34)}
.pile input:focus{outline:none;border-color:var(--corail);background:rgba(252,252,250,.1)}
.duo{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:520px){.duo{grid-template-columns:1fr}}

.bascule{display:flex;gap:9px}
.bascule button{
  flex:1;font-family:inherit;font-size:16px;font-weight:500;padding:14px 12px;
  background:rgba(252,252,250,.06);color:var(--pale);cursor:pointer;
  border:1.5px solid rgba(252,252,250,.16);border-radius:3px;transition:all .13s;
}
.bascule button.actif{background:rgba(255,112,107,.18);border-color:var(--corail);font-weight:700}
.consent{display:flex;gap:12px;align-items:flex-start;margin-bottom:13px;cursor:pointer}
.consent input{
  appearance:none;-webkit-appearance:none;flex-shrink:0;
  width:21px;height:21px;margin-top:2px;border-radius:3px;cursor:pointer;
  border:1.5px solid rgba(252,252,250,.35);background:rgba(252,252,250,.07);transition:all .12s;
}
.consent input:checked{background:var(--corail);border-color:var(--corail)}
.consent input:checked::after{
  content:"";display:block;width:6px;height:11px;margin:1px 0 0 6px;
  border:solid var(--vert);border-width:0 2.5px 2.5px 0;transform:rotate(43deg);
}
.consent span{font-size:15px;line-height:1.5;opacity:.88}
.consent span em{font-style:normal;opacity:.6;font-size:13.5px;display:block;margin-top:2px}
.consent a{color:var(--corail);text-decoration:underline;text-underline-offset:2px}

.legal{font-size:13px;line-height:1.6;opacity:.5;margin:20px 0 4px;padding-top:18px;border-top:1px solid rgba(252,252,250,.12)}
.sauter{
  display:inline-block;margin-top:16px;background:none;border:none;color:var(--pale);
  opacity:.5;font-family:inherit;font-size:14.5px;cursor:pointer;
  text-decoration:underline;text-underline-offset:3px;padding:6px 0;
}
.sauter:hover{opacity:.85}
.demo{margin-top:22px;font-size:12.5px;opacity:.4;letter-spacing:.03em}

.resultat{background:var(--creme);color:var(--vert);min-height:100%;padding:40px 24px 60px}
.res-inner{max-width:680px;margin:0 auto}
.res-inner h2{font-size:clamp(24px,4.2vw,32px);font-weight:800;letter-spacing:-.025em;margin-bottom:8px}
.res-inner .sous-titre{opacity:.68;margin-bottom:26px;font-size:16.5px}
.lettre{background:var(--pale);border:1px solid var(--gris);padding:30px;font-size:16px;line-height:1.72;white-space:pre-wrap}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.actions .btn{color:var(--vert)}
.actions .btn.ghost{border-color:var(--vert);color:var(--vert)}
.astuce{background:rgba(255,112,107,.1);border-left:3px solid var(--corail);padding:18px 22px;margin-top:30px;font-size:15.5px}
.astuce strong{font-weight:700}
.recap{margin-top:30px;font-size:14px;opacity:.6}

@media print{
  .bar,.scene,.actions,.astuce,.recap,.res-inner h2,.sous-titre{display:none!important}
  body{background:#fff;color:#000}
  .resultat{background:#fff;padding:0}
  .lettre{border:none;padding:0;font-size:11pt}
}
</style>
</head>

    <div class="bar-inner">
      <div class="logo">momenta<span>.</span></div>

    </div>
    <div class="piste"><div class="jauge" id="jauge"></div></div>
  </div>
  <div class="scene" id="scene"></div>
</div>

<script>
/* ============================================================
   LES QUESTIONS
   « autre:true » ajoute un choix qui s'écrit sur place.
   « multi:true » permet plusieurs réponses.
   ============================================================ */
var QUESTIONS = [
  {
    cle:'moment', autre:true,
    q:"Où en es-tu dans ta transition&nbsp;?",
    aide:"Ça détermine tout le reste — les choix suivants s'ajustent à ta réponse.",

    options:[
      {v:'gestionnaire',t:"Mon ou ma gestionnaire direct"},
      {v:'rh',          t:"Les ressources humaines"},
      {v:'lesdeux',     t:"Les deux en même temps"},
      {v:'dirigeant',   t:"Un membre de la direction"}
    ]
  },
  {
    cle:'taille',
    q:"Combien de personnes travaillent dans ton organisation&nbsp;?",
    aide:"Au-delà d'une certaine taille, un levier budgétaire s'ouvre.",
    options:[
      {v:'petite', t:"Moins de 50"},
      {v:'moyenne',t:"Entre 50 et 250"},
      {v:'grande', t:"Entre 250 et 1 000"},
      {v:'tres',   t:"Plus de 1 000"},
      {v:'inconnu',t:"Je ne sais pas"}
    ]
  },
  {
    cle:'secteur', autre:true,
    q:"Dans quel secteur&nbsp;?",
    aide:"Certains secteurs ont des données qui leur sont propres.",
    inviteAutre:"Ton secteur…",
    options:[
      {v:'juridique',t:"Services professionnels ou juridiques"},
      {v:'finance',  t:"Finance ou assurance"},
      {v:'public',   t:"Secteur public ou municipal"},
      {v:'techno',   t:"Technologie"}
    ]
  },
  {
    cle:'gestion',
    q:"As-tu des responsabilités de gestion&nbsp;?",
    aide:"78&nbsp;% des femmes de la dernière cohorte en avaient.",
    options:[
      {v:'equipe',  t:"Je gère une équipe"},
      {v:'projets', t:"Je gère des projets"},
      {v:'lesdeux', t:"Je gère une équipe et des projets"},

  },
  {
    cle:'enjeu', autre:true, multi:true,
    q:"Qu'est-ce qui te ressemble le plus en ce moment&nbsp;?",
    aide:"Ce sont les mots des femmes qui ont fait le parcours avant toi. Tu peux en choisir plusieurs.",
    inviteAutre:"Dis-le dans tes mots…",
    options:function(r){ return optionsEnjeu(r); }
  },
  {
    cle:'climat',
    q:"Comment te sens-tu soutenue par ton employeur en ce moment&nbsp;?",
    aide:"Personne ne verra ta réponse. Elle règle le ton de la lettre.",
    options:[
      {v:'pleinement',t:"Pleinement"},
      {v:'partie',    t:"En partie"},
      {v:'peu',       t:"Peu"},
      {v:'pasdutout', t:"Pas du tout"}
    ]
  },
  {
    cle:'demande', autre:true,
    q:"Qu'est-ce que tu demandes&nbsp;?",
    aide:"Un partage de coût est souvent un oui plus facile à donner.",
    inviteAutre:"Ce que tu demandes…",
    options:[
      {v:'tout',   t:"Que l'organisation paie le parcours"},
      {v:'partage',t:"Qu'on partage le coût", sous:"C'est ce que la majorité des femmes préfèrent"},
      {v:'temps',  t:"Seulement l'accord pour le temps", sous:"Je paie moi-même"}
    ]
  }
];

/* ============================================================
   LES ENJEUX — croisés phase × défi
   Le wiki Momenta (Segments-comportementaux.md) est explicite : la
   segmentation doit croiser la PHASE et le DÉFI, pas le défi seul.
   Formulations reprises des sondages inscription (n=40), non-inscrites
   (n=31) et post-cohorte (n=22).
   ============================================================ */
var LIBELLES = {
  /* — avant le départ (enceinte) — */
  annonce:       {t:"Annoncer ma grossesse me stresse plus que ça devrait", sous:"En parler à mon employeur sans me diminuer"},
  depart:        {t:"Je ne sais pas comment préparer mon départ",           sous:"Passer le relais sans que tout retombe sur les autres"},
  pause:         {t:"J'ai peur que mon congé me coûte ma progression",      sous:"Ne pas perdre le terrain que j'ai gagné"},
  relais_equipe: {t:"Je dois passer le relais de mon équipe et ça m'angoisse", sous:"Confier mon équipe sans perdre ma place"},
  relais_projets:{t:"Je dois confier mes dossiers et je ne sais pas à qui ni comment", sous:"Transférer mes mandats proprement"},

  /* — pendant le congé, retour à venir — */
  plan:          {t:"Je n'ai aucun plan pour mon retour",                   sous:"Revenir avec une structure, pas à l'aveugle"},
  place_futur:   {t:"J'ai peur de ne plus être à ma place en revenant",     sous:"Revenir sans avoir à tout reprouver"},
  reprise_equipe:{t:"Je vais retrouver mon équipe et je ne me sens pas solide", sous:"Reprendre mon rôle de gestionnaire avec confiance"},
  reprise_projets:{t:"Je vais reprendre mes dossiers et je me demande si j'aurai le souffle", sous:"Retrouver ma capacité à mener des mandats exigeants"},

  /* — déjà de retour — */
  place:         {t:"Je ne me sens plus tout à fait à ma place",            sous:"Retrouver ma légitimité professionnelle"},
  charge:        {t:"La charge mentale me gruge",                           sous:"Tenir un rôle exigeant sans m'épuiser"},
  limites:       {t:"Je n'arrive pas à faire respecter mes limites",        sous:"Poser un cadre et le tenir, sans culpabilité"},
  encore:        {t:"Je suis revenue depuis quelques mois et mon retour ne se passe pas bien", sous:"Rentrer au bureau n'a pas suffi"},
  encore_long:   {t:"Ça fait plus d'un an et mon retour n'est toujours pas digéré", sous:"Le temps n'a pas réglé le problème"},
  posture:       {t:"Je gère une équipe et je ne me sens plus solide",      sous:"Retrouver ma posture de gestionnaire"},
  pilotage:      {t:"Je porte des dossiers et je n'ai plus le même souffle",sous:"Retrouver ma capacité à mener des mandats exigeants"},

  /* — transversaux — */
  avancer:       {t:"Je veux continuer à avancer, pas juste tenir",         sous:"Reprendre ma progression là où je l'ai laissée"},
  avancer_avant: {t:"Je veux continuer à avancer, pas juste tenir",         sous:"Que ma carrière ne se mette pas sur pause en même temps que moi"},
  clarte:        {t:"Je ne sais plus trop où je m'en vais",                 sous:"Y voir clair sur ma prochaine étape"},
  sens:          {t:"Je me demande si je suis encore à la bonne place",     sous:"Revalider ma trajectoire, ou la changer"},
  reseau:        {t:"Je me sens pas mal seule dans cette transition",       sous:"Un réseau de femmes qui vivent la même transition"}
};

/* Chaque phase ne propose que ce qui peut réellement lui arriver.
   Une femme enceinte n'est pas encore confrontée au retour ; une femme
   revenue depuis un an n'a plus de départ à préparer. */
var PAR_PHASE = {
  enceinte:  ['annonce','depart','pause','avancer_avant'],
  conge:     ['plan','place_futur','charge','reseau'],
  retour6:   ['place','charge','limites','reseau'],
  retour12:  ['encore','clarte','place','charge'],
  retourplus:['sens','clarte','avancer','encore_long']
};

/* La responsabilité de gestion se dit à trois temps : je pars et je dois
   passer le relais · je vais reprendre · je suis dedans en ce moment. */
var GESTION_PAR_PHASE = {
  enceinte: {equipe:'relais_equipe',  projets:'relais_projets',  lesdeux:'relais_equipe'},
  conge:    {equipe:'reprise_equipe', projets:'reprise_projets', lesdeux:'reprise_equipe'},
  present:  {equipe:'posture',        projets:'pilotage',        lesdeux:'posture'}
};

function optionsEnjeu(r){
  var liste = (PAR_PHASE[r.moment] || PAR_PHASE.retour6).slice();
  var table = GESTION_PAR_PHASE[r.moment] || GESTION_PAR_PHASE.present;
  var ajout = table[r.gestion];
  if (ajout) liste.unshift(ajout);
  return liste.map(function(v){ return {v:v, t:LIBELLES[v].t, sous:LIBELLES[v].sous}; });
}

    veut:"aborder mon congé avec l'organisation sans avoir l'impression de m'excuser",

  relais_projets:{

  },
  place_futur:{

  },
  reprise_equipe:{

  },
  reprise_projets:{

    employeur:"Ce que ça veut dire pour l'organisation : les dossiers que je reprends avancent au rythme prévu, plutôt qu'au rythme de ce que j'arrive à absorber."
  },

/* ============================================================
   ASSEMBLAGE
   ============================================================ */
function texteAutre(r, cle){ return (r.autres && r.autres[cle]) ? r.autres[cle] : null; }

function assembler(r){
  var p = [];
  var grosse = (r.taille === 'moyenne' || r.taille === 'grande' || r.taille === 'tres');

  p.push("Bonjour " + BLANC + ",");

  /* ouverture — sa propre formulation si elle a écrit dans « Autre ».
     Le mois reste un blanc : elle le remplit avant d'envoyer. */
  var ouv = (r.moment === 'autre')
    ? (texteAutre(r,'moment') || OUVERTURE.retour6)
    : OUVERTURE[r.moment].replace('{mois}', BLANC);
  p.push(ouv + (CLIMAT[r.climat] || ""));

  var situation = situationPendantParcours(r);
  var avantRetour = (r.moment === 'enceinte' || r.moment === 'conge');
  var tempsGestion = avantRetour ? GESTION.avenir : GESTION.present;
  p.push(RECADRAGE + " " + (tempsGestion[r.gestion] || tempsGestion.non));

  /* secteur */
  if (r.secteur === 'juridique' || r.secteur === 'finance') p.push(SECTEUR[r.secteur]);
  else if (r.secteur === 'autre' && texteAutre(r,'secteur'))
    p.push("Dans " + texteAutre(r,'secteur') + ", comme partout au Canada, 70 % des femmes ne reçoivent aucun soutien ni accommodement particulier à leur retour de congé parental. C'est l'angle mort que ce parcours vient combler.");
  else p.push(SECTEUR.general);

  /* enjeux — un ou plusieurs, plus sa propre formulation */
  var choisis = [].concat(r.enjeu || []).filter(function(v){ return v !== 'autre'; });
  var sien = texteAutre(r,'enjeu');
  var veulent = choisis.map(function(v){ return ENJEU[v].veut; });
  if (sien) veulent.push(sien);
  if (!veulent.length) veulent = [ENJEU.place.veut];

  var phrase = "Ce que je veux travailler en priorité, c'est " + veulent[0];
  if (veulent.length === 2) phrase += ", et aussi " + veulent[1];
  else if (veulent.length > 2) phrase += ", et aussi " + veulent.slice(1, -1).join(", ") + " et " + veulent[veulent.length - 1];
  phrase += ".";

  var pivot = choisis.length ? ENJEU[choisis[0]] : ENJEU.place;
  p.push(phrase + " Les participantes de la dernière cohorte ont mesuré " + pivot.mesure +
         ". Et 91 % d'entre elles estiment que leur organisation bénéficierait du programme.");
  p.push(pivot.employeur);

  /* « départ » serait ambigu pour une femme sur le point de partir en congé :
     on dit explicitement qu'il s'agit d'une employée qui ne revient pas. */
  var calcul = "Le coût est de 1 495 $, comparé aux quelque 30 000 $ que coûte en moyenne le remplacement d'une employée qui ne revient pas. Le parcours est reconnu par l'Ordre des CRHA pour 14 heures de formation continue — il est admissible au budget de formation";
  p.push(calcul + (grosse ? " et se comptabilise sous la loi du 1 %." : "."));

  if (r.destinataire === 'rh' || r.destinataire === 'lesdeux') p.push(LIGNE_RH);

  var dem = (r.demande === 'autre')
    ? (texteAutre(r,'demande') || DEMANDE.tout)
    : ((avantRetour && DEMANDE_AVANT_RETOUR[r.demande]) || DEMANDE[r.demande]);
  p.push(dem + " " + LOGISTIQUE[situation || 'inconnu']);

  p.push(CLOTURE[r.destinataire] || CLOTURE.autre);
  if (r.format === 'lettre') p.push("Merci de votre considération.");
  p.push(r.signature);

  var corps = p.join("\n\n");
  return (r.format === 'lettre') ? corps
    : "Objet : Demande de financement — parcours Momenta, automne 2026\n\n" + corps;
}

function contexteIA(r){
  var lib = function(cle, v){
    if (v === 'autre') return texteAutre(r, cle) || "autre";
    var q = QUESTIONS.filter(function(x){ return x.cle === cle; })[0];
    var liste = (typeof q.options === 'function') ? q.options(r) : q.options;
    var o = liste.filter(function(x){ return x.v === v; })[0];
    return o ? o.t : v;
  };
  var enj = [].concat(r.enjeu || []).map(function(v){ return lib('enjeu', v); }).join(" · ");
  return "Voici le contexte. Réécris la lettre ci-dessous dans mes mots, sans changer les chiffres ni les faits.\n\n"
    + "- Situation : " + lib('moment', r.moment) + "\n"
    + "- Destinataire : " + lib('destinataire', r.destinataire) + "\n"
    + "- Organisation : " + lib('taille', r.taille) + " · " + lib('secteur', r.secteur) + "\n"
    + "- Gestion : " + lib('gestion', r.gestion) + "\n"
    + "- Ce que je vis : " + enj + "\n"
    + "- Soutien ressenti : " + lib('climat', r.climat) + "\n"
    + "- Demande : " + lib('demande', r.demande) + "\n\n"
    + "----- LETTRE -----\n\n" + assembler(r);
}

}

function rendre(){
  progres();
  if (pas < QUESTIONS.length) return rendreQuestion(QUESTIONS[pas]);
  if (pas === QUESTIONS.length) return rendreFinal();
  return rendreResultat();

/* --- ENDPOINT à null : rien n'est transmis en démo.
       Pour activer, y mettre l'URL du webhook GoHighLevel. --- */
var ENDPOINT = null;
function envoyerVersCRM(d){
  if (!ENDPOINT) return Promise.resolve({demo:true});
  return fetch(ENDPOINT, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
}

function estChoisi(cle, v){
  var actuel = rep[cle];
  return Array.isArray(actuel) ? actuel.indexOf(v) > -1 : actuel === v;
}

function rendreQuestion(Q){
  var choix = (typeof Q.options === 'function') ? Q.options(rep) : Q.options;
  var ouvertAutre = estChoisi(Q.cle, 'autre') || !!rep.autres[Q.cle];

  var h = '<div class="etape"><div class="q">' + Q.q + '</div>' +
          '<div class="aide">' + Q.aide + '</div><div class="choix">';

  choix.forEach(function(o){
    h += '<button class="opt' + (estChoisi(Q.cle, o.v) ? ' coche' : '') + '" data-v="' + o.v + '">' +
         o.t + (o.sous ? '<span class="sous">' + o.sous + '</span>' : '') + '</button>';
  });

  if (Q.autre){
    if (ouvertAutre){
      h += '<div class="autre-boite">' +
             '<input id="autre" type="text" placeholder="' + (Q.inviteAutre || 'Dans tes mots…') + '" value="' + (rep.autres[Q.cle] || '').replace(/"/g,'&quot;') + '">' +
             (Q.multi ? '' : '<button class="fleche" id="valider-autre">→</button>') +
           '</div>';
    } else {
      h += '<button class="opt" data-v="autre">Autre<span class="sous">Écris-le toi-même</span></button>';
    }
  }
  h += '</div>';

  if (Q.multi) h += '<div class="suite"><button class="btn" id="continuer">Continuer</button></div>';
  if (pas > 0) h += '<button class="retour">← retour</button>';
  h += '</div>';
  scene.innerHTML = h;

  var champAutre = document.getElementById('autre');

  function capterAutre(){
    if (!champAutre) return;
    var v = champAutre.value.trim();
    if (v) rep.autres[Q.cle] = v; else delete rep.autres[Q.cle];
  }

  function avancer(){
    capterAutre();
    nettoyerEnjeu(Q.cle);
    pas++; rendre();
  }

  scene.querySelectorAll('.opt').forEach(function(b){
    b.addEventListener('click', function(){
      var v = b.dataset.v;
      if (Q.multi){
        capterAutre();
        var liste = [].concat(rep[Q.cle] || []);
        var i = liste.indexOf(v);
        if (i > -1) liste.splice(i, 1); else liste.push(v);
        rep[Q.cle] = liste;
        rendre();                       // redessine, ne quitte pas l'écran
        var c = document.getElementById('autre');
        if (v === 'autre' && c) c.focus();
      } else {
        rep[Q.cle] = v;
        if (v === 'autre'){
          rendre();                     // ouvre le champ, curseur dedans
          var ch = document.getElementById('autre');
          if (ch) ch.focus();
        } else {
          delete rep.autres[Q.cle];
          nettoyerEnjeu(Q.cle);
          pas++; rendre();
        }
      }
    });
  });

  if (champAutre){
    champAutre.focus();
    champAutre.setSelectionRange(champAutre.value.length, champAutre.value.length);
    champAutre.addEventListener('keydown', function(e){
      if (e.key === 'Enter'){ e.preventDefault(); if (champAutre.value.trim()) avancer(); }
    });
    var fl = document.getElementById('valider-autre');
    if (fl){
      var majFleche = function(){ fl.disabled = !champAutre.value.trim(); };
      majFleche();
      champAutre.addEventListener('input', majFleche);
      fl.addEventListener('click', function(){ if (champAutre.value.trim()) avancer(); });
    }
  }

  var cont = document.getElementById('continuer');
  if (cont){
    var majCont = function(){
      var n = [].concat(rep[Q.cle] || []).filter(function(v){ return v !== 'autre'; }).length;
      cont.disabled = !(n > 0 || (champAutre && champAutre.value.trim()));
    };
    majCont();
    if (champAutre) champAutre.addEventListener('input', majCont);
    cont.addEventListener('click', avancer);
  }

  var r = scene.querySelector('.retour');
  if (r) r.addEventListener('click', function(){ capterAutre(); pas--; rendre(); });
}

/* Si elle revient changer sa phase ou sa gestion, les enjeux déjà choisis
   peuvent ne plus exister dans la nouvelle liste — on écarte les orphelins. */
function nettoyerEnjeu(cle){
  if (cle !== 'moment' && cle !== 'gestion') return;
  if (!rep.enjeu) return;
  var valides = optionsEnjeu(rep).map(function(o){ return o.v; });
  valides.push('autre');
  rep.enjeu = [].concat(rep.enjeu).filter(function(v){ return valides.indexOf(v) > -1; });
  if (!rep.enjeu.length) delete rep.enjeu;
}

            function(){ rep.captee = true; pas++; rendre(); });
  });

  document.getElementById('b-sauter').addEventListener('click', function(){ figerLettre(); pas++; rendre(); });
  scene.querySelector('.retour').addEventListener('click', function(){ pas--; rendre(); });
}

function rendreResultat(){
  var texte = assembler(rep);
  document.getElementById('bar').style.display = 'none';
  app.innerHTML =
    '<div class="resultat"><div class="res-inner">' +
      '<h2>Ta lettre</h2>' +
      '<p class="sous-titre">' + (rep.captee
        ? 'Elle s\'en va aussi dans ta boîte courriel. Relis-la, ajuste ce qui ne te ressemble pas, et envoie.'
        : 'Relis-la, ajuste ce qui ne te ressemble pas, et envoie.') + '</p>' +
      '<div class="lettre" id="txt"></div>' +
      '<div class="actions">' +
        '<button class="btn" id="b-copier">Copier la lettre</button>' +
        '<button class="btn ghost" id="b-imprimer">Imprimer / PDF</button>' +
        '<button class="btn ghost sm" id="b-recommencer">Recommencer</button>' +
      '</div>' +
      '<div class="astuce">' +
        '<strong>Tu préfères l\'écrire dans tes mots&nbsp;?</strong> Copie le contexte ci-dessous et colle-le dans l\'assistant d\'intelligence artificielle que tu utilises — il contient tes réponses et la lettre, avec la consigne de ne rien changer aux chiffres.' +
        '<div class="actions" style="margin-top:14px"><button class="btn ghost sm" id="b-ia">Copier le contexte pour un assistant IA</button></div>' +
      '</div>' +
      '<p class="recap">Chiffres : sondage post-cohorte Momenta printemps 2026 (22 répondantes sur 42) · sondage d\'inscription (40 répondantes) · Randstad Canada 2024 · American Bar Association.</p>' +
    '</div></div>';

  document.getElementById('txt').textContent = texte;
  brancherCopie('b-copier', texte, 'Copier la lettre');
  brancherCopie('b-ia', contexteIA(rep), 'Copier le contexte pour un assistant IA');
  document.getElementById('b-imprimer').addEventListener('click', function(){ window.print(); });
  document.getElementById('b-recommencer').addEventListener('click', function(){ location.reload(); });
}

function brancherCopie(id, texte, libelle){
  var btn = document.getElementById(id);
  btn.addEventListener('click', function(){
    var fini = function(ok){
      btn.textContent = ok ? 'Copié ✓' : 'Sélectionne et copie à la main';
      setTimeout(function(){ btn.textContent = libelle; }, 2200);
    };
    if (navigator.clipboard && window.isSecureContext){
      navigator.clipboard.writeText(texte).then(function(){ fini(true); }, function(){ fini(false); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = texte; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      var ok = false; try { ok = document.execCommand('copy'); } catch(e){}
      document.body.removeChild(ta); fini(ok);
    }
  });
}

rendre();
