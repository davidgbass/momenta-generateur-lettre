<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Ta lettre à ton employeur — Momenta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--vert:#01282b;--corail:#ff706b;--gris:#ded9d4;--creme:#f2f0eb;--pale:#fcfcfa}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--vert);color:var(--pale);line-height:1.55;font-size:17px;
  -webkit-font-smoothing:antialiased;
}
.app{min-height:100%;display:flex;flex-direction:column}

/* ---------- barre ---------- */
.bar{padding:20px 24px 0;flex-shrink:0}
.bar-inner{max-width:620px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.logo{font-weight:800;font-size:19px;letter-spacing:-.02em}
.logo span{color:var(--corail)}
.compte{font-size:13px;font-weight:600;opacity:.55;letter-spacing:.04em}
.piste{max-width:620px;margin:0 auto;height:3px;background:rgba(252,252,250,.16);border-radius:2px;overflow:hidden}
.jauge{height:100%;width:0;background:var(--corail);transition:width .32s cubic-bezier(.4,0,.2,1)}

/* ---------- scène ---------- */
.scene{flex:1;display:flex;align-items:center;padding:32px 24px 48px}
.etape{max-width:620px;margin:0 auto;width:100%;animation:entre .34s cubic-bezier(.16,1,.3,1)}
@keyframes entre{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.q{font-size:clamp(25px,4.6vw,34px);font-weight:800;letter-spacing:-.025em;line-height:1.18;margin-bottom:8px}
.aide{font-size:15.5px;opacity:.62;margin-bottom:26px}

.choix{display:flex;flex-direction:column;gap:9px}
.opt{
  width:100%;text-align:left;font-family:inherit;font-size:17px;font-weight:500;
  background:rgba(252,252,250,.06);color:var(--pale);
  border:1.5px solid rgba(252,252,250,.16);border-radius:3px;
  padding:16px 20px;cursor:pointer;transition:all .13s;
}
.opt:hover,.opt:focus-visible{background:rgba(255,112,107,.14);border-color:var(--corail);outline:none;transform:translateX(3px)}
.opt .sous{display:block;font-size:14px;font-weight:400;opacity:.55;margin-top:3px}

.retour{
  margin-top:26px;background:none;border:none;color:var(--pale);opacity:.45;
  font-family:inherit;font-size:14.5px;cursor:pointer;padding:6px 0;
}
.retour:hover{opacity:.8}

/* ---------- précision dans ses mots ---------- */
.plus{
  display:inline-flex;align-items:center;gap:7px;margin-top:18px;
  background:none;border:none;color:var(--corail);font-family:inherit;
  font-size:14.5px;font-weight:600;cursor:pointer;padding:6px 0;
}
.plus:hover{opacity:.8}
.plus .croix{font-size:17px;line-height:1;transition:transform .18s}
.plus.ouvert .croix{transform:rotate(45deg)}
.boite{display:none;margin-top:12px}
.boite.ouvert{display:block;animation:entre .22s ease}
.boite textarea{
  width:100%;font-family:inherit;font-size:16px;line-height:1.55;padding:14px 16px;
  background:rgba(252,252,250,.07);color:var(--pale);resize:vertical;min-height:92px;
  border:1.5px solid rgba(252,252,250,.18);border-radius:3px;
}
.boite textarea::placeholder{color:rgba(252,252,250,.32)}
.boite textarea:focus{outline:none;border-color:var(--corail);background:rgba(252,252,250,.1)}
.boite .indice{font-size:13px;opacity:.45;margin-top:8px}
.pastille{
  display:inline-block;margin-left:8px;font-size:11.5px;font-weight:700;
  background:var(--corail);color:var(--vert);padding:2px 8px;border-radius:20px;
  letter-spacing:.03em;vertical-align:middle;
}

/* ---------- champs ---------- */
.grille{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.ch label{display:block;font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.55;margin-bottom:6px}
.ch input{
  width:100%;font-family:inherit;font-size:17px;padding:13px 15px;
  background:rgba(252,252,250,.07);color:var(--pale);
  border:1.5px solid rgba(252,252,250,.18);border-radius:3px;
}
.ch input::placeholder{color:rgba(252,252,250,.3)}
.ch input:focus{outline:none;border-color:var(--corail);background:rgba(252,252,250,.1)}

.btn{
  font-family:inherit;font-size:15.5px;font-weight:700;letter-spacing:.02em;
  background:var(--corail);color:var(--vert);border:none;
  padding:15px 30px;border-radius:3px;cursor:pointer;transition:opacity .13s;
}
.btn:hover{opacity:.86}
.btn.ghost{background:none;border:1.5px solid rgba(252,252,250,.3);color:var(--pale)}
.btn.ghost:hover{border-color:var(--pale);opacity:1}
.btn.sm{font-size:14px;padding:11px 20px}
.btn:disabled{opacity:.32;cursor:not-allowed}
.btn:disabled:hover{opacity:.32}

/* ---------- consentement ---------- */
.consent{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;cursor:pointer}
.consent input{
  appearance:none;-webkit-appearance:none;flex-shrink:0;
  width:21px;height:21px;margin-top:2px;border-radius:3px;cursor:pointer;
  border:1.5px solid rgba(252,252,250,.35);background:rgba(252,252,250,.07);
  transition:all .12s;
}
.consent input:checked{background:var(--corail);border-color:var(--corail)}
.consent input:checked::after{
  content:"";display:block;width:6px;height:11px;margin:1px 0 0 6px;
  border:solid var(--vert);border-width:0 2.5px 2.5px 0;transform:rotate(43deg);
}
.consent span{font-size:15px;line-height:1.5;opacity:.88}
.consent span em{font-style:normal;opacity:.6;font-size:13.5px;display:block;margin-top:2px}
.consent a{color:var(--corail);text-decoration:underline;text-underline-offset:2px}

/* champs sans étiquette, à la manière du formulaire du site */
.pile{display:flex;flex-direction:column;gap:11px;margin-bottom:22px}
.pile input{
  width:100%;font-family:inherit;font-size:16.5px;padding:14px 16px;
  background:rgba(252,252,250,.07);color:var(--pale);
  border:1.5px solid rgba(252,252,250,.18);border-radius:3px;
}
.pile input::placeholder{color:rgba(252,252,250,.34)}
.pile input:focus{outline:none;border-color:var(--corail);background:rgba(252,252,250,.1)}
.duo{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:520px){.duo{grid-template-columns:1fr}}

.legal{
  font-size:13px;line-height:1.6;opacity:.5;margin:22px 0 4px;
  padding-top:18px;border-top:1px solid rgba(252,252,250,.12);
}
.sauter{
  display:inline-block;margin-top:18px;background:none;border:none;
  color:var(--pale);opacity:.5;font-family:inherit;font-size:14.5px;
  cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:6px 0;
}
.sauter:hover{opacity:.85}
.demo{
  margin-top:26px;font-size:12.5px;opacity:.4;letter-spacing:.03em;
}

/* ---------- résultat ---------- */
.resultat{background:var(--creme);color:var(--vert);min-height:100%;padding:40px 24px 60px}
.res-inner{max-width:680px;margin:0 auto}
.res-inner h2{font-size:clamp(24px,4.2vw,32px);font-weight:800;letter-spacing:-.025em;margin-bottom:8px}
.res-inner .sous-titre{opacity:.68;margin-bottom:26px;font-size:16.5px}

.lettre{
  background:var(--pale);border:1px solid var(--gris);padding:30px;
  font-size:16px;line-height:1.72;white-space:pre-wrap;
}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.actions .btn{color:var(--vert)}
.actions .btn.ghost{border-color:var(--vert);color:var(--vert)}

.astuce{
  background:rgba(255,112,107,.1);border-left:3px solid var(--corail);
  padding:18px 22px;margin-top:30px;font-size:15.5px;
}
.astuce strong{font-weight:700}

.recap{margin-top:30px;font-size:14px;opacity:.6}
.recap b{font-weight:600}

@media print{
  body{background:#fff;color:#000}
  .bar,.scene,.actions,.astuce,.recap,.res-inner h2,.sous-titre{display:none!important}
  .resultat{background:#fff;padding:0}
  .lettre{border:none;padding:0;font-size:11pt}
}
</style>
</head>

  {
    cle:'gestion',
    q:"As-tu des responsabilités de gestion&nbsp;?",

    ]
  },
  {
    cle:'enjeu',
    q:"Qu'est-ce qui te ressemble le plus en ce moment&nbsp;?",
    aide:"Ce sont les mots des femmes qui ont fait le parcours avant toi.",
    invite:"Dis-le dans tes mots si aucun choix ne colle tout à fait…",
    options:function(r){ return optionsEnjeu(r); }
  },
  {
    cle:'climat',
    q:"Comment te sens-tu soutenue par ton employeur en ce moment&nbsp;?",
    aide:"Personne ne verra ta réponse. Elle règle le ton de la lettre.",
    options:[
      {v:'pleinement',t:"Pleinement"},
      {v:'partie',    t:"En partie"},
      {v:'peu',       t:"Peu"},

  },
  {

    ]
  }
];

/* ============================================================
   LES BLOCS DE TEXTE
   ============================================================ */
var OUVERTURE = {
  enceinte:  "Je pars bientôt en congé de maternité et je reviendrai en {mois}. Je veux préparer ce retour maintenant, pas la veille.",

  retour6:   "Je suis revenue de congé parental il y a quelques mois. Maintenant que la poussière retombe, je veux investir dans la suite.",

var RECADRAGE = "Ce n'est pas un accompagnement de retour au travail. C'est un parcours de développement du leadership de cinq mois, animé par des sommités québécoises — à la dernière cohorte, Sonia Lupien sur les mécanismes du stress, Lory Zéphyr sur la charge mentale, Marylise Champagne sur la légitimité professionnelle — et bâti autour d'un réseau de professionnelles qui traversent la même transition.";

var GESTION = {
  equipe: "À la dernière cohorte, 78 % des participantes géraient une équipe ou des projets. Je fais partie de celles qui dirigent une équipe : ce qui se travaille là se répercute directement sur les personnes que je gère.",
  projets:"À la dernière cohorte, 78 % des participantes géraient une équipe ou des projets, comme moi.",

/* ------------------------------------------------------------
   LES ENJEUX — croisés phase × défi
   Le wiki Momenta (Segments-comportementaux.md) est explicite : la segmentation
   doit croiser la PHASE (congé / retour récent / emploi) et le DÉFI, pas le défi
   seul. Chaque phase reçoit donc son propre jeu de choix, dans les mots relevés
   dans les sondages d'inscription (n=40), non-inscrites (n=31) et post-cohorte (n=22).

  annonce: {t:"Annoncer ma grossesse me stresse plus que ça devrait", sous:"En parler à mon employeur sans me diminuer"},

  plan:    {t:"Je n'ai aucun plan pour mon retour",                   sous:"Revenir avec une structure, pas à l'aveugle"},
  place:   {t:"Je ne me sens plus tout à fait à ma place",            sous:"Retrouver ma légitimité professionnelle"},
  charge:  {t:"La charge mentale me gruge",                           sous:"Tenir un rôle exigeant sans m'épuiser"},
  limites: {t:"Je n'arrive pas à faire respecter mes limites",        sous:"Poser un cadre et le tenir, sans culpabilité"},
  avancer: {t:"Je veux continuer à avancer, pas juste tenir",         sous:"Reprendre ma progression, pas seulement recoller les morceaux"},
  clarte:  {t:"Je ne sais plus trop où je m'en vais",                 sous:"Y voir clair sur ma prochaine étape"},
  encore:  {t:"Je suis revenue depuis un bout, et ça ne va toujours pas", sous:"Ce n'est pas réglé juste parce que je suis rentrée"},
  sens:    {t:"Je me demande si je suis encore à la bonne place",     sous:"Revalider ma trajectoire, ou la changer"},
  reseau:  {t:"Je me sens pas mal seule là-dedans",                   sous:"Un réseau de femmes qui vivent la même chose"},
  posture: {t:"Je gère une équipe et je ne me sens plus solide",      sous:"Retrouver ma posture de gestionnaire"},
  pilotage:{t:"Je porte des dossiers et je n'ai plus le même souffle",sous:"Retrouver ma capacité à mener des mandats exigeants"}
};

/* Quels choix, selon où elle en est. */
var PAR_PHASE = {
  enceinte:  ['annonce','pause','plan','avancer','reseau'],
  conge:     ['plan','place','pause','charge','reseau'],
  retour6:   ['place','charge','limites','avancer','reseau'],
  retour12:  ['encore','clarte','place','avancer','charge'],
  retourplus:['sens','clarte','avancer','encore','reseau']
};

function optionsEnjeu(r){
  var liste = (PAR_PHASE[r.moment] || PAR_PHASE.retour6).slice();
  // la responsabilité de gestion passe devant : c'est l'angle le plus fort pour l'employeur
  if (r.gestion === 'equipe')  liste.unshift('posture');
  if (r.gestion === 'projets') liste.unshift('pilotage');
  return liste.map(function(v){
    return {v:v, t:LIBELLES[v].t, sous:LIBELLES[v].sous};
  });
}

    employeur:"Ce que ça veut dire pour l'organisation : une employée qui sait ce qu'elle veut construire ici, plutôt qu'une qui finit par aller chercher la réponse ailleurs."

    veut:"retrouver ma capacité à porter des mandats exigeants",
    mesure:"leur posture de leadership passer de 5,0 à 7,6 sur 10",
    employeur:"Ce que ça veut dire pour l'organisation : les dossiers que je porte avancent au rythme prévu, plutôt qu'au rythme de ce que j'arrive à absorber."
  }
};

var DEMANDE = {
  tout:   "Je vous demande de financer ma participation.",
  partage:"Je vous propose qu'on partage le coût : l'organisation en assume une partie, moi l'autre.",
  temps:  "Je financerai le parcours moi-même. Ce que je vous demande, c'est votre accord pour le temps."
};

var CLOTURE = {
  gestionnaire:"Est-ce que je peux compter sur votre appui ?",
  rh:          "Est-ce que c'est une demande que vous pouvez évaluer ?",
  lesdeux:     "Est-ce que je peux compter sur votre appui ?",
  dirigeant:   "Est-ce que je peux compter sur votre appui ?"
};

var LIGNE_RH = "Deux éléments qui vous concernent directement : la reconnaissance CRHA rend le parcours comptabilisable sous la loi du 1 %, et il constitue une mesure documentable de prévention des risques psychosociaux au sens de la Loi 27.";

/* ============================================================
   ASSEMBLAGE
   ============================================================ */
function assembler(r){
  var p = [];
  var grosse = (r.taille === 'moyenne' || r.taille === 'grande' || r.taille === 'tres');
  var n = r.notes || {};

  // insère la précision écrite par la femme, dans ses mots, si elle en a laissé une
  var mot = function(cle){ if (n[cle]) p.push(n[cle]); };

  p.push("Bonjour " + r.prenomDest + ",");

  p.push(OUVERTURE[r.moment].replace('{mois}', r.mois) + CLIMAT[r.climat]);
  mot('moment'); mot('climat');

  p.push(RECADRAGE + " " + GESTION[r.gestion]);
  mot('gestion');

  p.push(SECTEUR[r.secteur] || SECTEUR.autre);
  mot('secteur'); mot('taille');

  p.push("Ce que je veux travailler en priorité, c'est " + ENJEU[r.enjeu].veut +
         ". Les participantes de la dernière cohorte ont mesuré " + ENJEU[r.enjeu].mesure +
         ". Et 91 % d'entre elles estiment que leur organisation bénéficierait du programme.");
  mot('enjeu');
  p.push(ENJEU[r.enjeu].employeur);

  var calcul = "Le coût est de 1 495 $, comparé aux quelque 30 000 $ que coûte en moyenne le départ d'une employée au Canada. Le parcours est reconnu par l'Ordre des CRHA pour 14 heures de formation continue — il est admissible au budget de formation";
  calcul += grosse ? " et se comptabilise sous la loi du 1 %." : ".";
  p.push(calcul);

  if (r.destinataire === 'rh' || r.destinataire === 'lesdeux') p.push(LIGNE_RH);

  p.push(DEMANDE[r.demande] + " Le parcours va du 30 septembre au début février : deux heures aux dix jours, sur l'heure du midi, toutes les séances enregistrées. Je ne m'absente pas de mes dossiers.");
  mot('demande'); mot('destinataire'); mot('libre');

  p.push(CLOTURE[r.destinataire]);

  if (r.format === 'lettre') p.push("Merci de votre considération.");

  p.push(r.signature);

  var corps = p.join("\n\n");
  return (r.format === 'courriel')
    ? "Objet : Demande de financement — parcours Momenta, automne 2026\n\n" + corps
    : corps;
}

function contexteIA(r){
  var lib = function(cle, v){
    var q = QUESTIONS.filter(function(x){return x.cle===cle;})[0];
    var liste = (typeof q.options === 'function') ? q.options(r) : q.options;
    var o = liste.filter(function(x){return x.v===v;})[0];
    return o ? o.t : v;
  };
  return "Voici le contexte. Réécris la lettre ci-dessous dans mes mots, sans changer les chiffres ni les faits.\n\n"
    + "- Situation : " + lib('moment', r.moment) + "\n"
    + "- Destinataire : " + lib('destinataire', r.destinataire) + "\n"
    + "- Organisation : " + lib('taille', r.taille) + " · " + lib('secteur', r.secteur) + "\n"
    + "- Gestion : " + lib('gestion', r.gestion) + "\n"
    + "- Priorité : " + lib('enjeu', r.enjeu) + "\n"
    + "- Soutien ressenti : " + lib('climat', r.climat) + "\n"
    + "- Demande : " + lib('demande', r.demande) + "\n\n"
    + "----- LETTRE -----\n\n" + assembler(r);
}

/* ============================================================
   INTERFACE
   ============================================================ */
var rep = {notes:{}}, pas = 0;
var TOTAL = QUESTIONS.length + 2;

/* Bloc « précision dans mes mots » — disponible sur chaque écran.
   Ce que la femme écrit entre tel quel dans la lettre, à l'endroit qui lui
   correspond. Rien n'est reformulé. */
function blocPrecision(cle, invite){
  var v = rep.notes[cle] || '';
  return '<button class="plus' + (v ? ' ouvert' : '') + '" data-cible="' + cle + '">' +
           '<span class="croix">+</span> Ajouter une précision dans mes mots' +
           (v ? '<span class="pastille">ajoutée</span>' : '') +
         '</button>' +
         '<div class="boite' + (v ? ' ouvert' : '') + '" id="boite-' + cle + '">' +
           '<textarea id="note-' + cle + '" placeholder="' + invite + '">' + v + '</textarea>' +
           '<p class="indice">Écrit dans tes mots. Ça entrera tel quel dans ta lettre.</p>' +
         '</div>';
}

function brancherPrecision(cle){
  var btn = scene.querySelector('.plus[data-cible="' + cle + '"]');
  if (!btn) return;
  var boite = document.getElementById('boite-' + cle);
  btn.addEventListener('click', function(){
    btn.classList.toggle('ouvert');
    boite.classList.toggle('ouvert');
    if (boite.classList.contains('ouvert')) document.getElementById('note-' + cle).focus();
  });
}

function saisirPrecision(cle){
  var champ = document.getElementById('note-' + cle);
  if (!champ) return;
  var v = champ.value.trim();
  if (v) rep.notes[cle] = v; else delete rep.notes[cle];
}
var scene = document.getElementById('scene');
var app = document.getElementById('app');

function progres(){
  document.getElementById('jauge').style.width = ((pas / TOTAL) * 100) + '%';
  document.getElementById('compte').textContent = (pas < TOTAL) ? (pas + 1) + ' / ' + TOTAL : '';
}

function rendre(){
  progres();
  if (pas < QUESTIONS.length) return rendreQuestion(QUESTIONS[pas]);
  if (pas === QUESTIONS.length) return rendreChamps();
  if (pas === QUESTIONS.length + 1) return rendreCoordonnees();
  return rendreResultat();
}

/* ------------------------------------------------------------
   BRANCHEMENT CRM — inactif en démo.
   Pour activer : remplacer ENDPOINT par l'URL du webhook GoHighLevel
   et retirer le court-circuit. La charge utile inclut les réponses au
   questionnaire, ce qui doit rester couvert par l'avis de collecte affiché.
   ------------------------------------------------------------ */
var ENDPOINT = null;

function envoyerVersCRM(donnees){
  if (!ENDPOINT) return Promise.resolve({demo:true});
  return fetch(ENDPOINT, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(donnees)
  });
}

function rendreQuestion(Q){
  var choix = (typeof Q.options === 'function') ? Q.options(rep) : Q.options;
  var h = '<div class="etape"><div class="q">' + Q.q + '</div>' +
          '<div class="aide">' + Q.aide + '</div><div class="choix">';
  choix.forEach(function(o, i){
    h += '<button class="opt" data-v="' + o.v + '">' + o.t +
         (o.sous ? '<span class="sous">' + o.sous + '</span>' : '') + '</button>';
  });
  h += '</div>';
  h += blocPrecision(Q.cle, Q.invite || "Ce que tu veux ajouter, dans tes mots…");
  if (pas > 0) h += '<button class="retour">← retour</button>';
  h += '</div>';
  scene.innerHTML = h;

  scene.querySelectorAll('.opt').forEach(function(b){
    b.addEventListener('click', function(){
      saisirPrecision(Q.cle);
      rep[Q.cle] = b.dataset.v;
      // Si elle revient changer sa phase ou sa gestion, l'enjeu déjà choisi
      // peut ne plus exister dans la nouvelle liste — on l'efface pour qu'elle
      // repasse par l'écran plutôt que de traîner un choix orphelin.
      if ((Q.cle === 'moment' || Q.cle === 'gestion') && rep.enjeu){
        var encoreLa = optionsEnjeu(rep).some(function(o){ return o.v === rep.enjeu; });
        if (!encoreLa) delete rep.enjeu;
      }
      pas++; rendre();
    });
  });
  brancherPrecision(Q.cle);
  var r = scene.querySelector('.retour');
  if (r) r.addEventListener('click', function(){ saisirPrecision(Q.cle); pas--; rendre(); });
}

function rendreChamps(){
  scene.innerHTML =
    '<div class="etape">' +
      '<div class="q">Les derniers détails</div>' +
      '<div class="aide">Trois champs, et ta lettre est prête.</div>' +
      '<div class="grille">' +
        '<div class="ch"><label for="c-dest">Prénom du destinataire</label><input id="c-dest" type="text" placeholder="Prénom" autocomplete="off"></div>' +
        '<div class="ch"><label for="c-mois">Mois de ton retour</label><input id="c-mois" type="text" placeholder="janvier" autocomplete="off"></div>' +
        '<div class="ch"><label for="c-sign">Ta signature</label><input id="c-sign" type="text" placeholder="Ton nom" autocomplete="off"></div>' +
      '</div>' +
      '<div class="aide" style="margin-bottom:14px">Tu veux&nbsp;:</div>' +
      '<div class="choix">' +
        '<button class="opt" data-f="courriel">Un courriel<span class="sous">Avec une ligne d\'objet, prêt à envoyer</span></button>' +
        '<button class="opt" data-f="lettre">Une lettre<span class="sous">Format plus formel, sans objet</span></button>' +
      '</div>' +
      blocPrecision('libre', "Un dernier mot pour ton employeur — un projet en cours, une entente déjà prise, ce que tu veux qu'il retienne…") +
      '<button class="retour">← retour</button>' +
    '</div>';

  brancherPrecision('libre');

  scene.querySelectorAll('.opt').forEach(function(b){
    b.addEventListener('click', function(){
      saisirPrecision('libre');
      rep.prenomDest = document.getElementById('c-dest').value.trim() || '[Prénom]';
      rep.mois       = document.getElementById('c-mois').value.trim() || '[mois]';
      rep.signature  = document.getElementById('c-sign').value.trim() || '[Ta signature]';
      rep.format     = b.dataset.f;
      pas++; rendre();
    });
  });
  scene.querySelector('.retour').addEventListener('click', function(){ saisirPrecision('libre'); pas--; rendre(); });
}

function rendreCoordonnees(){
  scene.innerHTML =
    '<div class="etape">' +
      '<div class="q">Ta lettre est prête</div>' +
      '<div class="aide">On te l\'envoie, avec la page d\'impact à joindre en PDF.</div>' +
      '<div class="pile">' +
        '<div class="duo">' +
          '<input id="c-prenom" type="text" placeholder="Prénom" autocomplete="given-name">' +
          '<input id="c-nom" type="text" placeholder="Nom de famille" autocomplete="family-name">' +
        '</div>' +
        '<input id="c-tel" type="tel" placeholder="Téléphone" autocomplete="tel">' +
        '<input id="c-mail" type="email" placeholder="Courriel" autocomplete="email">' +
        '<input id="c-org" type="text" placeholder="Ton organisation (facultatif)" autocomplete="organization">' +
      '</div>' +
      '<label class="consent"><input type="checkbox" id="k-envoi"><span>J\'accepte les <a href="https://momentareseau.com/termsandconditions" target="_blank" rel="noopener">termes et conditions</a>.</span></label>' +
      '<label class="consent"><input type="checkbox" id="k-info"><span>Je veux aussi recevoir les nouvelles de Momenta.<em>Les cohortes, les webinaires gratuits. Je peux me désabonner en tout temps, en un clic.</em></span></label>' +
      '<div style="margin-top:22px"><button class="btn" id="b-envoyer" disabled>Je reçois ma lettre</button></div>' +
      '<button class="sauter" id="b-sauter">Voir ma lettre sans donner mes coordonnées</button>' +
      '<p class="legal">Momenta Réseau inc. recueille tes coordonnées et tes réponses au questionnaire — pour t\'envoyer ta lettre et comprendre les besoins des femmes qui utilisent l\'outil. Rien n\'est partagé avec un tiers. Tu peux retirer ton consentement ou demander la suppression de tes données en tout temps.</p>' +
      '<p class="demo">Démonstration — aucune donnée n\'est transmise ni conservée.</p>' +
      '<button class="retour">← retour</button>' +
    '</div>';

  var val = function(id){ return document.getElementById(id).value.trim(); };
  var kEnvoi = document.getElementById('k-envoi');
  var bouton = document.getElementById('b-envoyer');
  var requis = ['c-prenom','c-nom','c-tel','c-mail'];

  function valider(){
    var pleins = requis.every(function(id){ return val(id).length > 1; });
    var courrielOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val('c-mail'));
    var telOk = (val('c-tel').replace(/\D/g,'').length >= 10);
    bouton.disabled = !(pleins && courrielOk && telOk && kEnvoi.checked);
  }
  requis.forEach(function(id){ document.getElementById(id).addEventListener('input', valider); });
  kEnvoi.addEventListener('change', valider);

  bouton.addEventListener('click', function(){
    bouton.disabled = true;
    bouton.textContent = 'Un instant…';
    envoyerVersCRM({
      prenom: val('c-prenom'),
      nom: val('c-nom'),
      telephone: val('c-tel'),
      courriel: val('c-mail'),
      organisation: val('c-org') || null,
      consentement_termes: true,
      consentement_infolettre: document.getElementById('k-info').checked,
      reponses: rep,
      source: 'generateur-lettre-employeur'
    }).then(function(){ rep.captee = true; pas++; rendre(); },
            function(){ rep.captee = true; pas++; rendre(); });
  });

  document.getElementById('b-sauter').addEventListener('click', function(){ pas++; rendre(); });
  scene.querySelector('.retour').addEventListener('click', function(){ pas--; rendre(); });
}

function rendreResultat(){
  var texte = assembler(rep);
  document.getElementById('bar').style.display = 'none';
  app.innerHTML =
    '<div class="resultat"><div class="res-inner">' +
      '<h2>Ta lettre</h2>' +
      '<p class="sous-titre">' + (rep.captee
        ? 'Elle s\'en va aussi dans ta boîte courriel. Relis-la, ajuste ce qui ne te ressemble pas, et envoie.'
        : 'Relis-la, ajuste ce qui ne te ressemble pas, et envoie.') + '</p>' +
      '<div class="lettre" id="txt"></div>' +
      '<div class="actions">' +
        '<button class="btn" id="b-copier">Copier la lettre</button>' +
        '<button class="btn ghost" id="b-imprimer">Imprimer / PDF</button>' +
        '<button class="btn ghost sm" id="b-recommencer">Recommencer</button>' +
      '</div>' +
      '<div class="astuce">' +
        '<strong>Tu préfères l\'écrire dans tes mots&nbsp;?</strong> Copie le contexte ci-dessous et colle-le dans ChatGPT ou Claude — il contient tes réponses et la lettre, avec la consigne de ne rien changer aux chiffres.' +
        '<div class="actions" style="margin-top:14px"><button class="btn ghost sm" id="b-ia">Copier le contexte pour mon IA</button></div>' +
      '</div>' +
      '<p class="recap">Chiffres : sondage post-cohorte Momenta printemps 2026 (22 répondantes sur 42) · sondage d\'inscription (40 répondantes) · Randstad Canada 2024 · American Bar Association.</p>' +
    '</div></div>';

  document.getElementById('txt').textContent = texte;
  brancherCopie('b-copier', texte, 'Copier la lettre');
  brancherCopie('b-ia', contexteIA(rep), 'Copier le contexte pour mon IA');
  document.getElementById('b-imprimer').addEventListener('click', function(){ window.print(); });
  document.getElementById('b-recommencer').addEventListener('click', function(){ location.reload(); });
}

function brancherCopie(id, texte, libelle){
  var btn = document.getElementById(id);
  btn.addEventListener('click', function(){
    var fini = function(ok){
      btn.textContent = ok ? 'Copié ✓' : 'Sélectionne et copie à la main';
      setTimeout(function(){ btn.textContent = libelle; }, 2200);
    };
    if (navigator.clipboard && window.isSecureContext){
      navigator.clipboard.writeText(texte).then(function(){ fini(true); }, function(){ fini(false); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = texte; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      var ok = false; try { ok = document.execCommand('copy'); } catch(e){}
      document.body.removeChild(ta); fini(ok);
    }
  });
}

rendre();
</script>
